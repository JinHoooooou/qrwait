server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5434/qrwait
    username: qrwait
    password: CHANGEME
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
