spring:
  datasource:
    url: jdbc:postgresql://localhost:5434/qrwait
    username: qrwait
    password: CHANGEME
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop   # 테스트 시 Hibernate가 테이블 생성/삭제
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: false            # 테스트에서는 Flyway 비활성화

  data:
    redis:
      host: localhost
      port: 6379

cors:
  allowed-origins: http://localhost:5173

app:
  base-url: http://localhost:5173

jwt:
  secret: test-secret-key-for-unit-tests-only-not-for-production
  access-expiry: 3600
  refresh-expiry: 604800
