server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA 라우팅 — 존재하지 않는 경로는 index.html로 폴백
    location / {
        try_files $uri $uri/ /index.html;
    }

    # /api/ 요청은 백엔드로 프록시
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
